<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUV-F | Pink Edition Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #fff5f7;
            --card-bg: #ffffff;
            --accent: #ff7eb9; /* Rosa Principale */
            --accent-dark: #e84393;
            --secondary: #fd96c4;
            --text: #4a1c30;
            --malos: #ff4757;
            --gray: #fce4ec;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: var(--text); }
        
        /* Navbar */
        .navbar { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gray); }
        .lang-select { background: var(--gray); color: var(--accent-dark); border: none; padding: 8px; border-radius: 10px; font-weight: bold; }

        .screen { display: none; padding: 20px; max-width: 1200px; margin: auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }

        /* Login Pink */
        .card-auth { background: white; padding: 40px; border-radius: 40px; text-align: center; box-shadow: 0 10px 30px rgba(255, 126, 185, 0.2); max-width: 400px; margin: 60px auto; border: 1px solid var(--gray); }
        
        /* Parametri */
        .group-header { padding: 12px; border-radius: 15px; color: white; margin-top: 30px; font-weight: bold; text-transform: uppercase; font-size: 0.8em; background: var(--accent); letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; margin-top: 15px; }
        .param-card { background: white; padding: 20px; border-radius: 25px; border-bottom: 5px solid var(--gray); position: relative; transition: 0.3s; }
        .param-card.malos-mode { background: #fff0f0; border-bottom-color: var(--malos); }

        .malos-btn { font-size: 0.65em; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--gray); cursor: pointer; float: right; font-weight: bold; background: white; color: #999; }
        .malos-active { background: var(--malos); color: white; border-color: var(--malos); }

        /* Sliders Pink */
        .slider-label { font-size: 0.75em; font-weight: bold; color: var(--accent-dark); display: flex; justify-content: space-between; margin-top: 10px; }
        input[type=range] { width: 100%; margin: 10px 0; accent-color: var(--accent); }
        
        /* Logic Section */
        .logic-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; border-left: 10px solid var(--accent); }
        .example-box { background: var(--bg); padding: 15px; border-radius: 15px; margin-top: 10px; font-family: monospace; font-size: 0.9em; }

        /* Score Box */
        .score-box { background: var(--accent); color: white; padding: 40px; border-radius: 40px; text-align: center; margin-top: 40px; box-shadow: 0 15px 30px rgba(255, 126, 185, 0.4); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--gray); }
        .nav-item { color: #d1d1d1; cursor: pointer; font-size: 0.7em; font-weight: 900; text-transform: uppercase; }
        .nav-item.active-nav { color: var(--accent-dark); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight: 900; color: var(--accent-dark); font-size: 1.2em;">SUV-F <span style="font-weight: 300;">🌸</span></div>
    <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
        <option value="it">IT</option>
        <option value="en">EN</option>
    </select>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
    <div class="card-auth">
        <h2 style="color:var(--accent-dark);">Welcome, Diva.</h2>
        <p id="txt_welcome" style="font-size:0.85em; color:#888; margin-bottom:25px;"></p>
        <input type="text" id="username" placeholder="Nome Analista" style="width:80%; padding:15px; border-radius:20px; border:2px solid var(--gray); margin-bottom:15px; outline:none;">
        <button onclick="login()" id="btn_login" style="width:88%; background:var(--accent); color:white; padding:15px; border:none; border-radius:20px; font-weight:bold; cursor:pointer;"></button>
    </div>
</div>

<!-- RATING -->
<div id="ratingScreen" class="screen">
    <input type="text" id="fruitSearch" style="width:100%; padding:20px; border-radius:30px; border:none; background:white; box-shadow:0 10px 20px rgba(0,0,0,0.05); font-size:1em; margin-bottom:20px; box-sizing:border-box;" placeholder="Nome del frutto...">
    
    <div id="dynamicParams"></div>

    <div class="score-box">
        <div style="opacity:0.8; font-size:0.9em; letter-spacing:2px;">TOTAL INDEX</div>
        <div id="finalScore" style="font-size:6em; font-weight:900;">0</div>
        <button onclick="saveData()" id="btn_save" style="background:white; color:var(--accent-dark); border:none; padding:15px 40px; border-radius:20px; font-weight:900; cursor:pointer; margin-top:15px;"></button>
    </div>
</div>

<!-- LOGICA DI CALCOLO -->

    <p>Il sistema SUV-F non somma semplicemente i voti, ma calcola il <strong>Peso Specifico</strong> di ogni sensazione.</p>
