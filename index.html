<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUV-F: Universal Fruit Rating</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --c1: #e74c3c; --c2: #2ecc71; --c3: #9b59b6; --c4: #f1c40f; --c5: #34495e;
            --accent: #3498db; --bg: #f0f2f5; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Stili Gruppi */
        .group-header { padding: 10px 20px; border-radius: 15px; color: white; margin: 25px 0 15px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .g1 { background: var(--c1); } .g2 { background: var(--c2); } .g3 { background: var(--c3); } .g4 { background: var(--c4); color: #333; } .g5 { background: var(--c5); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .param-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid #eee; transition: 0.3s; position: relative; }
        .param-card:hover { border-color: var(--accent); }
        
        .info-btn { background: #ddd; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: help; float: right; font-weight: bold; }
        .info-btn:hover::after {
            content: attr(data-info); position: absolute; background: #333; color: white; padding: 10px; 
            border-radius: 10px; width: 200px; z-index: 100; font-size: 12px; right: 10px; top: 40px; font-weight: normal;
        }

        .slider-label { font-size: 0.8em; color: #7f8c8d; display: flex; justify-content: space-between; margin-top: 5px; }
        input[type=range] { width: 100%; margin: 10px 0; cursor: pointer; }
        
        .score-box { background: #2c3e50; color: white; padding: 25px; border-radius: 25px; text-align: center; margin: 30px 0; position: sticky; bottom: 10px; z-index: 90; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        #finalScore { font-size: 3.5em; font-weight: bold; color: var(--accent); }

        #fruitImg { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 4px solid var(--accent); }
        .search-section { text-align: center; margin-bottom: 20px; }
        #fruitSearch { width: 90%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 1.1em; }
        
        #loginScreen { position: fixed; inset: 0; background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2>SUV-F ACCESS</h2>
        <input type="text" id="username" placeholder="Inserisci Nome" style="padding:15px; border-radius:10px; border:1px solid #ddd; width: 200px;"><br><br>
        <button onclick="startApp()" style="background:var(--accent); color:white; padding:15px 40px; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">ENTRA</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="search-section">
        <input type="text" id="fruitSearch" placeholder="🔍 Quale frutto stai testando?" oninput="searchFruit()">
        <div id="dropdown" style="background:white; border:1px solid #ddd; display:none; max-height:150px; overflow-y:auto; border-radius:0 0 15px 15px;"></div>
        <img id="fruitImg" src="">
    </div>

    <div id="dynamicParams"></div>

    <div class="score-box">
        <div>Punteggio Algoritmico Totale</div>
        <div id="finalScore">0</div>
        <div id="tierLabel" style="font-weight:bold; color:var(--f1c40f);">Tier: -</div>
        <button onclick="uploadFruit()" style="background:var(--accent); color:white; border:none; padding:12px 30px; border-radius:10px; margin-top:10px; cursor:pointer; font-weight:bold;">🚀 SINCRONIZZA NEL DATABASE</button>
    </div>

    <div style="background:white; border-radius:25px; padding:15px; margin:20px 0;"><canvas id="radarChart"></canvas></div>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div style="background:#fff; padding:15px; border-radius:20px; border:1px solid #eee;"><h3>Mie Recensioni</h3><div id="myList"></div></div>
        <div style="background:#fff; padding:15px; border-radius:20px; border:1px solid #eee;"><h3>Global Average</h3><div id="globalList"></div></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyASl7UbctX-4weq8w94ZUxCrOIhl3jjqME",
    authDomain: "suv-f-18d65.firebaseapp.com",
    databaseURL: "https://suv-f-18d65-default-rtdb.firebaseio.com",
    projectId: "suv-f-18d65",
    storageBucket: "suv-f-18d65.firebasestorage.app",
    appId: "1:138636031515:web:5708e43d7f3e8283157abe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = "";
let chart;

const groups = [
    { name: "Profilo Gusto", color: "#e74c3c", class: "g1", params: [
        { n: "Grado Brix", info: "Quanto è dolce? (Avocado: 0, Dattero: 100)" },
        { n: "Acidità", info: "Quanto è acido? (Limone: 100)" },
        { n: "Intensità del Sapore", info: "Sapore tenue vs sapore esplosivo." },
        { n: "Amarezza", info: "Percezione dell'amaro al palato." },
        { n: "Aftertaste (Retrogusto)", info: "Quanto persiste il sapore dopo aver mangiato?" },
        { n: "Astringenza (Leganosità)", info: "Quanto lega la bocca? (es. Mirto o Cachi acerbo)" },
        { n: "Tropicalità Percepita", info: "Vibrazioni tropicali indipendentemente dall'origine." },
        { n: "Effetto Mente Pulita", info: "Capacità di pulire il palato (Arancia: 100, Banana: 0)" },
        { n: "Soddisfazione Gustativa", info: "Piacere puro derivante dal sapore." }
    ]},
    { name: "Meccanica della Consistenza", color: "#2ecc71", class: "g2", params: [
        { n: "Crunchiness", info: "Croccantezza sorda e profonda (es. Mela)." },
        { n: "Crispyness", info: "Croccantezza vitrea superficiale (es. Buccia d'uva)." },
        { n: "Carnosità", info: "Quanto è densa e corposa la polpa? (Papaya: 100)" },
        { n: "Succosità", info: "Esplosione di liquido al morso." },
        { n: "Cremosità", info: "Consistenza vellutata e grassa (es. Avocado)." },
        { n: "Viscidità", info: "Sensazione gelatinosa/viscida (es. Passion Fruit)." },
        { n: "Secchezza", info: "Quanto è asciutta la fibra (es. Cocco secco)." },
        { n: "Farinosità", info: "Probabilità di consistenza sabbiosa." },
        { n: "Probabilità di Conati", info: "Fibre o cellulosa che danno fastidio alla gola." },
        { n: "Sound Design", info: "Soddisfazione uditiva prodotta dal morso." },
        { n: "Fibrosità", info: "Presenza di filamenti (es. Mango o Pesca)." }
    ]},
    { name: "Psicologia e Affidabilità", color: "#9b59b6", class: "g3", params: [
        { n: "Costanza (Ananas Factor)", info: "Probabilità di trovare un esemplare buono. Roulette russa vs Garanzia." },
        { n: "Range di Sfumature", info: "Il salto tra buono e cattivo è netto (Nespola) o graduale (Arancia)?" },
        { n: "Inganno Estetico", info: "Quanto l'aspetto mente sulla qualità reale (es. Mirtilli)." },
        { n: "Finestra di Godibilità", info: "Quanto dura il picco di perfezione?" },
        { n: "Sex Appeal", info: "Prestigio sociale nel servire questo frutto." }
    ]},
    { name: "Nutrizione e Sazietà", color: "#f1c40f", class: "g4", params: [
        { n: "Valore Nutrizionale", info: "Densità di vitamine e benefici percepiti." },
        { n: "Potere Saziante", info: "Quanto ti senti pieno dopo il consumo?" }
    ]},
    { name: "Logistica e Scarto", color: "#34495e", class: "g5", params: [
        { n: "Sbucciabilità", info: "Facilità di accesso al frutto." },
        { n: "Portabilità", info: "Resistenza agli urti nello zaino." },
        { n: "Seme Experience", info: "Il seme è piacere (Melograno) o ostacolo (Anguria)?" },
        { n: "Impegno Mentale", info: "Attenzione richiesta per mangiarlo (es. Fico d'India)." },
        { n: "Anatomia dello Scarto", info: "Ingombro e fastidio dei resti (Il Cadavere)." },
        { n: "Versatilità", info: "Usi alternativi (succhi, cocktail, salato)." },
        { n: "Parametro Buccia", info: "Bontà o riutilizzo della scorza." },
        { n: "Spreco", info: "Rapporto reale tra ciò che mangi e ciò che butti." }
    ]}
];

function startApp() {
    user = document.getElementById('username').value.trim();
    if(!user) return alert("Inserisci un nome!");
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderUI();
}

function renderUI() {
    const container = document.getElementById('dynamicParams');
    container.innerHTML = "";
    let pIndex = 0;

    groups.forEach(group => {
        const section = document.createElement('div');
        section.innerHTML = `<div class="group-header ${group.class}">${group.name}</div>`;
        const grid = document.createElement('div');
        grid.className = "grid";

        group.params.forEach(p => {
            grid.innerHTML += `
                <div class="param-card">
                    <button class="info-btn" data-info="${p.info}">?</button>
                    <strong>${p.n}</strong>
                    <input type="range" id="v_${pIndex}" min="0" max="100" value="50" oninput="updateScore()">
                    <div class="slider-label"><span>Basso</span><span id="val_${pIndex}">50</span><span>Alto</span></div>
                </div>`;
            pIndex++;
        });
        section.appendChild(grid);
        container.appendChild(section);
    });
    updateScore();
}

function updateScore() {
    let total = 0;
    let dataValues = [];
    let colors = [];
    let pIndex = 0;

    groups.forEach(g => {
        g.params.forEach(() => {
            const val = parseInt(document.getElementById(`v_${pIndex}`).value);
            document.getElementById(`val_${pIndex}`).innerText = val;
            total += val;
            dataValues.push(val);
            colors.push(g.color);
            pIndex++;
        });
    });

    document.getElementById('finalScore').innerText = total;
    let tier = "F-Tier";
    if(total > 2800) tier = "GOD-TIER";
    else if(total > 2200) tier = "S-Tier";
    else if(total > 1500) tier = "A-Tier";
    else if(total > 800) tier = "B-Tier";
    document.getElementById('tierLabel').innerText = "Tier: " + tier;

    drawRadar(dataValues);
}

function drawRadar(vals) {
    const ctx = document.getElementById('radarChart').getContext('2d');
    const labels = groups.flatMap(g => g.params.map(p => p.n));
    
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Profilo Frutto',
                data: vals,
                backgroundColor: 'rgba(52, 152, 219, 0.2)',
                borderColor: '#3498db',
                pointBackgroundColor: vals.map((v, i) => {
                    let cumulative = 0;
                    for(let g of groups) {
                        cumulative += g.params.length;
                        if(i < cumulative) return g.color;
                    }
                })
            }]
        },
        options: { 
            scales: { r: { min: 0, max: 100, ticks: { display: false } } },
            plugins: { legend: { display: false } }
        }
    });
}

function searchFruit() {
    const s = document.getElementById('fruitSearch').value.toLowerCase();
    const fList = ["Mela", "Banana", "Mango", "Arancia", "Ananas", "Avocado", "Cachi", "Anguria", "Mirtillo", "Uva", "Pesca", "Cocco", "Kiwi", "Fragola", "Ciliegia", "Papaya", "Pera"];
    const dd = document.getElementById('dropdown');
    dd.innerHTML = "";
    if(!s) { dd.style.display = 'none'; return; }
    fList.filter(f => f.toLowerCase().includes(s)).forEach(f => {
        const item = document.createElement('div');
        item.style.padding = "10px"; item.style.cursor = "pointer"; item.innerText = f;
        item.onclick = () => { 
            document.getElementById('fruitSearch').value = f; 
            dd.style.display = 'none';
            document.getElementById('fruitImg').src = `https://loremflickr.com/200/200/${f},fruit`;
            document.getElementById('fruitImg').style.display = "block";
        };
        dd.appendChild(item);
    });
    dd.style.display = 'block';
}

function uploadFruit() {
    const fruit = document.getElementById('fruitSearch').value;
    const score = document.getElementById('finalScore').innerText;
    if(!fruit) return alert("Scegli un frutto!");
    db.ref(`personal/${user}/${fruit}`).set(score);
    db.ref(`global/${fruit}`).push(parseInt(score));
    alert("Sincronizzato!");
    loadData();
}

function loadData() {
    db.ref(`personal/${user}`).on('value', snap => {
        const items = Object.entries(snap.val() || {}).sort((a,b)=>b[1]-a[1]);
        document.getElementById('myList').innerHTML = items.map(i => `<div class="list-item"><b>${i[0]}</b>: ${i[1]} PT</div>`).join('');
    });
}
</script>
</body>
</html>
