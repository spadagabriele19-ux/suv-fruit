<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUV-F: Universal Fruit Rating</title>
    <!-- Librerie Firebase (Versione compatibile 8.x) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Libreria Grafici -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --pos: #2ecc71; --neg: #e74c3c; --accent: #3498db; --weight: #f39c12; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .lang-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #loginScreen { position: fixed; inset: 0; background: #2c3e50; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: white; padding: 35px; border-radius: 20px; text-align: center; width: 300px; }
        .search-section { text-align: center; margin-bottom: 30px; position: relative; }
        #fruitSearch { width: 100%; max-width: 500px; padding: 15px; border-radius: 15px; border: 2px solid #ddd; font-size: 1.2em; outline: none; box-sizing: border-box; }
        .dropdown { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; border: 1px solid #ddd; z-index: 100; max-height: 200px; overflow-y: auto; border-radius: 0 0 15px 15px; display: none; }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; }
        .dropdown-item:hover { background: #f0f0f0; }
        #fruitImg { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin: 20px auto; display: none; border: 8px solid var(--bg); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .param-card { background: #fafafa; padding: 15px; border-radius: 15px; border: 1px solid #eee; position: relative; }
        .info-btn { background: #bdc3c7; color: white; border-radius: 50%; width: 22px; height: 22px; border: none; cursor: help; font-weight: bold; float: right; }
        .score-box { background: #2c3e50; color: white; padding: 30px; border-radius: 20px; text-align: center; margin: 40px 0; }
        #finalScore { font-size: 4em; font-weight: bold; color: var(--pos); line-height: 1; }
        #tierLabel { font-size: 1.5em; font-weight: bold; color: var(--weight); margin-top: 10px; }
        .btn-upload { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.1em; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
        .lists { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 50px; }
        .list-box { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; }
        .list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        input[type=range] { width: 100%; margin: 10px 0; }
        @media (max-width: 600px) { .lists { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 id="txtLoginTitle">SUV-F ACCESS</h2>
        <input type="text" id="username" placeholder="Username" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box;">
        <button onclick="startApp()" id="txtLoginBtn" style="background:var(--accent); color:white; padding:12px; border:none; border-radius:10px; width:100%; cursor:pointer; font-weight:bold;">LOGIN</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="header-nav">
        <h2 id="txtWelcome">Ciao, </h2>
        <button class="lang-btn" onclick="toggleLang()">IT / EN</button>
    </div>
    
    <div class="search-section">
        <input type="text" id="fruitSearch" placeholder="🔍 Cerca frutto..." oninput="searchFruit()">
        <div id="dropdown" class="dropdown"></div>
        <img id="fruitImg" src="" alt="Fruit Image">
    </div>

    <div class="grid" id="paramGrid"></div>

    <div class="score-box">
        <span id="txtLabelScore">Punteggio Algoritmico</span>
        <div id="finalScore">0</div>
        <div id="tierLabel">Tier: -</div>
        <button class="btn-upload" onclick="uploadFruit()" id="txtBtnUpload">🚀 SINCRONIZZA DATI</button>
    </div>

    <div style="background:white; border-radius:20px; padding:20px; margin-bottom: 30px;">
        <canvas id="radarChart"></canvas>
    </div>

    <div class="lists">
        <div class="list-box"><h3 id="txtLabelMyList">La Mia Classifica</h3><div id="myList"></div></div>
        <div class="list-box"><h3 id="txtLabelGlobal">Media Globale</h3><div id="globalList"></div></div>
    </div>
</div>

<script>
// CONFIGURAZIONE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyASl7UbctX-4weq8w94ZUxCrOIhl3jjqME",
    authDomain: "suv-f-18d65.firebaseapp.com",
    databaseURL: "https://suv-f-18d65-default-rtdb.firebaseio.com",
    projectId: "suv-f-18d65",
    storageBucket: "suv-f-18d65.firebasestorage.app",
    messagingSenderId: "138636031515",
    appId: "1:138636031515:web:5708e43d7f3e8283157abe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lang = 'it';
let user = "";
let chart;

const uiTexts = {
    it: { loginTitle: "SUV-F ACCESS", loginBtn: "ACCEDI", welcome: "Ciao, ", searchPlaceholder: "🔍 Cerca frutto...", labelScore: "Punteggio Algoritmico Pesato", btnUpload: "🚀 SINCRONIZZA CON IL MONDO", labelMyList: "La Mia Classifica", labelGlobal: "Media Globale (Community)", intensity: "Intensità", relevance: "Rilevanza", malus: "MALUS", syncAlert: "Dati Sincronizzati!", selectAlert: "Seleziona un frutto!", chartLabel: "Profilo Frutto" },
    en: { loginTitle: "SUV-F ACCESS", loginBtn: "LOGIN", welcome: "Hello, ", searchPlaceholder: "🔍 Search fruit...", labelScore: "Weighted Algorithmic Score", btnUpload: "🚀 SYNC WITH THE WORLD", labelMyList: "My Rankings", labelGlobal: "Global Average (Community)", intensity: "Intensity", relevance: "Relevance", malus: "MALUS", syncAlert: "Data Synced!", selectAlert: "Please select a fruit!", chartLabel: "Fruit Profile" }
};

const params = [
    { it: "Grado Brix", en: "Brix Degree", info_it: "Dolcezza", info_en: "Sweetness" },
    { it: "Acidità", en: "Acidity", info_it: "Note aspre", info_en: "Sour notes" },
    { it: "Intensità Sapore", en: "Flavor Intensity", info_it: "Potenza aromatica", info_en: "Flavor power" },
    { it: "Crunchiness", en: "Crunchiness", info_it: "Croccantezza profonda", info_en: "Deep crunch" },
    { it: "Succosità", en: "Juiciness", info_it: "Volume di succo", info_en: "Juice volume" },
    { it: "Costanza", en: "Consistency", info_it: "Probabilità di trovarlo buono", info_en: "Consistency of quality" }
];

function toggleLang() { 
    lang = lang === 'it' ? 'en' : 'it'; 
    updateUITexts(); 
    renderGrid(); 
    update(); 
}

function updateUITexts() { 
    const t = uiTexts[lang]; 
    document.getElementById('txtLoginTitle').innerText = t.loginTitle; 
    document.getElementById('txtLoginBtn').innerText = t.loginBtn; 
    document.getElementById('txtWelcome').innerText = t.welcome + user; 
    document.getElementById('fruitSearch').placeholder = t.searchPlaceholder; 
    document.getElementById('txtLabelScore').innerText = t.labelScore; 
    document.getElementById('txtBtnUpload').innerText = t.btnUpload; 
    document.getElementById('txtLabelMyList').innerText = t.labelMyList; 
    document.getElementById('txtLabelGlobal').innerText = t.labelGlobal; 
}

function startApp() { 
    user = document.getElementById('username').value.trim(); 
    if(!user) return alert("Inserisci un username"); 
    document.getElementById('loginScreen').style.display = 'none'; 
    document.getElementById('app').style.display = 'block'; 
    updateUITexts(); 
    renderGrid(); 
    loadData(); 
}

function renderGrid() { 
    const grid = document.getElementById('paramGrid'); 
    grid.innerHTML = ""; 
    params.forEach((p, i) => { 
        grid.innerHTML += `
            <div class="param-card">
                <button class="info-btn" title="${lang === 'it' ? p.info_it : p.info_en}">?</button>
                <strong>${lang === 'it' ? p.it : p.en}</strong>
                <div style="font-size:0.75em; margin-top:10px;">
                    ${uiTexts[lang].intensity}: <span id="vi_${i}">50</span> | 
                    ${uiTexts[lang].relevance}: <span id="wi_${i}">50</span>
                </div>
                <input type="range" id="v_${i}" min="0" max="100" value="50" oninput="update()">
                <input type="range" id="w_${i}" min="0" max="100" value="50" oninput="update()" style="filter:grayscale(1) opacity:0.6">
                <label style="font-size:0.75em; display:block; margin-top:5px;">
                    <input type="checkbox" id="m_${i}" onchange="update()"> ${uiTexts[lang].malus}
                </label>
            </div>`; 
    }); 
}

function update() { 
    let score = 0; 
    let data = []; 
    params.forEach((_, i) => { 
        const v = parseInt(document.getElementById(`v_${i}`).value); 
        const w = parseInt(document.getElementById(`w_${i}`).value); 
        const m = document.getElementById(`m_${i}`).checked; 
        document.getElementById(`vi_${i}`).innerText = v; 
        document.getElementById(`wi_${i}`).innerText = w; 
        score += m ? -(v * w / 10) : (v * w / 10); 
        data.push(v); 
    }); 
    const final = Math.round(score); 
    document.getElementById('finalScore').innerText = final; 
    
    let tier = "F-Tier"; 
    if(final > 1500) tier = "God-Tier"; 
    else if(final > 1000) tier = "S-Tier"; 
    else if(final > 500) tier = "A-Tier"; 
    else if(final > 0) tier = "B-Tier"; 
    document.getElementById('tierLabel').innerText = "Tier: " + tier; 
    
    drawChart(data); 
}

function drawChart(data) { 
    const ctx = document.getElementById('radarChart').getContext('2d'); 
    if(chart) chart.destroy(); 
    chart = new Chart(ctx, { 
        type: 'radar', 
        data: { 
            labels: params.map(p => lang === 'it' ? p.it : p.en), 
            datasets: [{ 
                label: uiTexts[lang].chartLabel, 
                data: data, 
                backgroundColor: 'rgba(52, 152, 219, 0.2)', 
                borderColor: '#3498db',
                pointBackgroundColor: '#3498db'
            }] 
        }, 
        options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } } } 
    }); 
}

function searchFruit() { 
    const s = document.getElementById('fruitSearch').value.toLowerCase(); 
    const dd = document.getElementById('dropdown'); 
    dd.innerHTML = ""; 
    if(!s) { dd.style.display = 'none'; return; } 
    const fList = ["Mela", "Banana", "Mango", "Arancia", "Ananas", "Avocado", "Cachi", "Anguria", "Mirtillo", "Uva", "Pesca", "Cocco", "Kiwi", "Fragola", "Ciliegia", "Papaya", "Pera"]; 
    const filtered = fList.filter(f => f.toLowerCase().includes(s));
    
    if(filtered.length > 0) {
        filtered.forEach(f => { 
            const div = document.createElement('div'); 
            div.className = "dropdown-item"; 
            div.innerText = f; 
            div.onclick = () => { 
                document.getElementById('fruitSearch').value = f; 
                const img = document.getElementById('fruitImg');
                img.src = `https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=200&q=80`; // Placeholder immagine
                img.style.display = "block"; 
                dd.style.display = 'none'; 
            }; 
            dd.appendChild(div); 
        }); 
        dd.style.display = 'block'; 
    } else {
        dd.style.display = 'none';
    }
}

function uploadFruit() { 
    const f = document.getElementById('fruitSearch').value; 
    const s = parseInt(document.getElementById('finalScore').innerText); 
    if(!f) return alert(uiTexts[lang].selectAlert); 
    db.ref(`personal/${user}/${f}`).set(s); 
    db.ref(`global/${f}`).push(s); 
    alert(uiTexts[lang].syncAlert); 
}

function loadData() { 
    db.ref(`personal/${user}`).on('value', snap => { 
        const val = snap.val() || {};
        const items = Object.entries(val).sort((a,b)=>b[1]-a[1]); 
        document.getElementById('myList').innerHTML = items.map(i => `<div class="list-item"><span>${i[0]}</span><strong>${i[1]} PT</strong></div>`).join(''); 
    }); 
    db.ref(`global`).on('value', snap => { 
        const g = snap.val() || {}; 
        const averages = Object.entries(g).map(([name, scores]) => { 
            const vals = Object.values(scores); 
            return { name, score: Math.round(vals.reduce((a,b)=>a+b,0)/vals.length) }; 
        }).sort((a,b)=>b.score-a.score); 
        document.getElementById('globalList').innerHTML = averages.map(i => `<div class="list-item"><span>${i.name}</span><strong>${i.score} PT</strong></div>`).join(''); 
    }); 
}
</script>
</body>
</html>
